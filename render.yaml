services:
  - type: web
    name: hotsearch-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "3001"
      - key: CACHE_TTL
        value: "600"
      - key: FETCH_INTERVAL
        value: "600"
      - key: REQUEST_TIMEOUT
        value: "10000"
      - key: SQLITE_PATH
        value: "./data/hot.db"
      - key: NODE_ENV
        value: "production"
      - key: CORS_ORIGIN
        value: "https://hotsearch.onrender.com,https://hot-search-rho.vercel.app"

  - type: static
    name: hotsearch
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://hotsearch-api-gmhm.onrender.com/api"
