services:
  - type: web
    name: hotsearch-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3001"
      - key: CACHE_TTL
        value: "300"
      - key: FETCH_INTERVAL
        value: "300"
      - key: REQUEST_TIMEOUT
        value: "10000"
      - key: CORS_ORIGIN
        value: "https://hotsearch.onrender.com,https://hot-search-rho.vercel.app"

  - type: static
    name: hotsearch
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://hotsearch-api-gmhm.onrender.com/api"
